apiVersion: apps/v1
kind: Deployment
metadata:
  name: jj-gym-postgres
  namespace: jj-gym
  labels:
    app: jj-gym-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jj-gym-postgres
  template:
    metadata:
      labels:
        app: jj-gym-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: jj_app_gym
            - name: POSTGRES_USER
              value: jj_app_gym
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jj-gym-postgres-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
