name: Deploy OCI API

on:
  workflow_dispatch:
    inputs:
      rollout_oke:
        description: "Executar rollout no OKE apos publicar imagem?"
        required: true
        type: boolean
        default: false
      target_environment:
        description: "Ambiente alvo"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

jobs:
  build_publish:
    name: Build and Publish to OCIR
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        shell: bash
        run: |
          IMAGE_REF="${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_NAMESPACE }}/${{ secrets.OCI_IMAGE_REPOSITORY }}:${GITHUB_SHA}"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REF }}

      - name: Output published image
        run: echo "Published image => ${{ env.IMAGE_REF }}"

  rollout_oke:
    name: Rollout on OKE
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    needs: build_publish
    if: ${{ inputs.rollout_oke == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup OCI CLI
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        shell: bash
        run: |
          mkdir -p "$HOME/.oci"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY_PEM }}" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/config" "$HOME/.oci/oci_api_key.pem"

      - name: Prepare kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.OKE_KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace
        run: kubectl create namespace jj-gym --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure image pull secret
        shell: bash
        run: |
          kubectl -n jj-gym create secret docker-registry ocir-secret \
            --docker-server='${{ secrets.OCI_REGISTRY }}' \
            --docker-username='${{ secrets.OCI_USERNAME }}' \
            --docker-password='${{ secrets.OCI_AUTH_TOKEN }}' \
            --docker-email='noreply@jjappgym.dev' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply base manifests
        shell: bash
        run: |
          IMAGE_REF="${{ secrets.OCI_REGISTRY }}/${{ secrets.OCI_NAMESPACE }}/${{ secrets.OCI_IMAGE_REPOSITORY }}:${GITHUB_SHA}"
          sed "s|REPLACE_IMAGE|$IMAGE_REF|g" deploy/oke/api-deployment.yaml | kubectl apply -f -
          kubectl apply -f deploy/oke/api-service.yaml

      - name: Apply API secrets
        shell: bash
        run: |
          kubectl -n jj-gym create secret generic jj-gym-api-secrets \
            --from-literal=DATABASE_URL='${{ secrets.API_DATABASE_URL }}' \
            --from-literal=JWT_SECRET='${{ secrets.API_JWT_SECRET }}' \
            --from-literal=ADMIN_API_KEY='${{ secrets.API_ADMIN_API_KEY }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait rollout
        run: kubectl -n jj-gym rollout status deployment/jj-gym-api --timeout=300s

      - name: Debug rollout (on failure)
        if: ${{ failure() }}
        shell: bash
        run: |
          kubectl -n jj-gym get deploy,rs,pods,svc -o wide || true
          kubectl -n jj-gym describe deployment jj-gym-api || true
          for POD in $(kubectl -n jj-gym get pods -l app=jj-gym-api -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true); do
            echo "### POD: $POD"
            kubectl -n jj-gym describe pod "$POD" || true
            kubectl -n jj-gym logs "$POD" --tail=200 || true
            kubectl -n jj-gym logs "$POD" --previous --tail=200 || true
          done
